    <style>
      /* ── Global Animations ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.2); }
        50% { box-shadow: 0 0 20px rgba(0,212,255,0.4); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes barGrow {
        from { width: 0%; }
      }
      @keyframes countUp {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }

      /* ── Loading Skeleton ── */
      .skeleton {
        background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }

      /* ── Animated Cards ── */
      .card-animate {
        animation: fadeInUp 0.4s ease-out both;
      }
      .card-animate:nth-child(2) { animation-delay: 0.05s; }
      .card-animate:nth-child(3) { animation-delay: 0.1s; }
      .card-animate:nth-child(4) { animation-delay: 0.15s; }
      .card-animate:nth-child(5) { animation-delay: 0.2s; }

      /* ── Stat bars animation ── */
      .stat-bar-fill {
        animation: barGrow 0.8s ease-out both;
      }

      /* ── Loading spinner ── */
      .ai-spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(0,212,255,0.1);
        border-top: 3px solid #00d4ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      /* ── Confidence badge glow ── */
      .conf-badge-high { animation: pulse-glow 2s ease-in-out infinite; }

      /* ── Numeric mono formatting ── */
      .num-mono {
        font-family: 'DM Sans', monospace;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
      }

      /* ── Responsive header ── */
      @media (max-width: 768px) {
        .header-nav {
          overflow-x: auto !important;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          gap: 4px !important;
          padding-right: 8px;
        }
        .header-nav::-webkit-scrollbar { display: none; }
        .header-nav > button {
          white-space: nowrap;
          flex-shrink: 0;
          padding: 5px 8px !important;
          font-size: 10px !important;
        }
        .header-brand { font-size: 18px !important; letter-spacing: 1px !important; }
        .main-content { padding: 12px 10px !important; }
        .league-grid { gap: 4px !important; }
        .league-grid > button { padding: 8px 10px !important; }
        .league-grid > button > div > div:first-child { font-size: 11px !important; }
        .fixture-grid { grid-template-columns: 1fr !important; }
      }

      @media (max-width: 480px) {
        .header-nav > button > span:first-child { display: none; }
        .header-brand { font-size: 16px !important; }
      }

      /* ── Value badge ── */
      .value-badge {
        background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(0,212,255,0.1));
        border: 1px solid rgba(34,197,94,0.35);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 800;
        color: #22c55e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* ── Edge indicator colors ── */
      .edge-positive { color: #22c55e; }
      .edge-negative { color: #ef4444; }
      .edge-neutral { color: #f59e0b; }

      /* ── Smooth transitions on interactive elements ── */
      button { transition: all 0.15s ease !important; }
      button:hover { filter: brightness(1.1); }
      button:active { transform: scale(0.97); }

      /* ── Scrollbar styling ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
      ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.15); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.3); }
